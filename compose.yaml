services:
  bot:
    build:
      context: .
      args:
        UID: ${HOST_UID:?set HOST_UID before building, e.g. HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose build}
        GID: ${HOST_GID:?set HOST_GID before building, e.g. HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose build}
    env_file: ./data/.env
    environment:
      FASTEMBED_CACHE_PATH: /app/data/fastembed_cache
      HF_HOME: /app/data/huggingface
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
        compress: "true"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"         # required by Let's Encrypt HTTP-01 challenge
      - "8443:8443"     # HTTPS — non-standard because 443 is taken by MTProto on this host
    env_file: ./data/.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
