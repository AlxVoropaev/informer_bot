services:
  bot:
    build:
      context: .
      args:
        UID: ${HOST_UID:?set HOST_UID before building, e.g. HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose build}
        GID: ${HOST_GID:?set HOST_GID before building, e.g. HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose build}
    env_file: ./data/.env
    environment:
      FASTEMBED_CACHE_PATH: /app/data/fastembed_cache
      HF_HOME: /app/data/huggingface
      MINIAPP_URL_FILE: /cloudflared/cloudflared.log
    volumes:
      - ./data:/app/data
      - cloudflared_state:/cloudflared:ro
    depends_on:
      - cloudflared
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
        compress: "true"

  cloudflared:
    image: cloudflare/cloudflared:latest
    user: "0:0"  # root: needed so cloudflared can create the logfile in the named volume
    command: >
      tunnel --no-autoupdate --url http://bot:8080
      --logfile /shared/cloudflared.log --loglevel info
    volumes:
      - cloudflared_state:/shared
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  cloudflared_state:
