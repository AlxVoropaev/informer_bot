services:
  processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
      args:
        UID: ${HOST_UID:?set HOST_UID before building, e.g. HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose -f compose.processor.yaml build}
        GID: ${HOST_GID:?set HOST_GID before building, e.g. HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose -f compose.processor.yaml build}
    env_file: ./data/.env
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
        compress: "true"
