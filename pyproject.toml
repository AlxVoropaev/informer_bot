[project]
name = "informer-bot"
version = "0.1.0"
description = "Telegram news aggregator that summarises channel posts with Claude"
requires-python = ">=3.12"
dependencies = [
    "telethon>=1.36",
    "python-telegram-bot>=21.0",
    "anthropic>=0.40",
    "openai>=1.50",
    "python-dotenv>=1.0",
    "fastembed>=0.4",
    "numpy<2",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.uv]
package = false
