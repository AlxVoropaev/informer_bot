<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Informer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <input id="search" type="search" placeholder="Search channels…" autocomplete="off" />
    <button id="settings-btn" class="icon-btn" type="button" title="Settings">⚙️</button>
    <button id="usage-btn" class="icon-btn" type="button" title="Usage">📊</button>
    <select id="lang"></select>
  </header>

  <main id="list" class="list" aria-busy="true">
    <div class="empty" id="loading">Loading…</div>
  </main>

  <section id="usage" class="details hidden" aria-hidden="true">
    <button class="back" id="usage-back" type="button">← Back</button>
    <h2 id="usage-title">Usage</h2>
    <div id="usage-body"></div>
  </section>

  <section id="settings" class="details hidden" aria-hidden="true">
    <button class="back" id="settings-back" type="button">← Back</button>
    <h2 id="settings-title">Settings</h2>

    <div class="usage-section">
      <h3 id="autodel-heading">Auto-delete</h3>
      <p id="autodel-hint" class="tips"></p>
      <label class="filter">
        <span id="autodel-label">Hours (1–720, blank to disable)</span>
        <input id="autodel-input" type="number" min="1" max="720" step="1" inputmode="numeric" />
      </label>
      <div class="filter-actions">
        <button id="autodel-save" type="button" class="primary">Save</button>
        <button id="autodel-clear" type="button" class="ghost">Disable</button>
      </div>
    </div>

    <div class="usage-section">
      <h3 id="dedup-debug-heading">Dedup debug</h3>
      <p id="dedup-debug-hint" class="tips"></p>
      <label class="filter">
        <input id="dedup-debug-input" type="checkbox" />
        <span id="dedup-debug-label">Enable</span>
      </label>
    </div>
  </section>

  <section id="details" class="details hidden" aria-hidden="true">
    <button class="back" id="details-back" type="button">← Back</button>
    <h2 id="details-title"></h2>
    <a id="details-link" class="link" target="_blank" rel="noopener" hidden></a>
    <p id="details-about" class="about"></p>

    <fieldset class="modes">
      <legend>Delivery mode</legend>
      <label><input type="radio" name="mode" value="off" /><span>⬜ Off</span></label>
      <label><input type="radio" name="mode" value="filtered" /><span>🔀 Filtered</span></label>
      <label><input type="radio" name="mode" value="debug" /><span>🐞 Debug</span></label>
      <label><input type="radio" name="mode" value="all" /><span>✅ All</span></label>
    </fieldset>

    <label class="filter">
      <span>Filter prompt</span>
      <textarea id="filter-input" rows="6" placeholder="Plain-language rules for what you want to see…"></textarea>
    </label>
    <div class="filter-actions">
      <button id="filter-save" type="button" class="primary">Save filter</button>
      <button id="filter-clear" type="button" class="ghost">Clear</button>
    </div>
    <p class="tips" id="filter-tips"></p>
  </section>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/static/app.js"></script>
</body>
</html>
