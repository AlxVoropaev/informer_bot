<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Informer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <input id="search" type="search" placeholder="Search channels…" autocomplete="off" />
    <button id="settings-btn" class="icon-btn" type="button" title="Settings">⚙️</button>
    <button id="usage-btn" class="icon-btn" type="button" title="Usage">📊</button>
    <select id="lang"></select>
  </header>

  <div id="provider-banner" class="provider-banner" hidden></div>

  <div id="active-model" class="active-model" hidden></div>

  <nav id="tabs" class="tabs" hidden>
    <button id="tab-subscribe" class="tab active" type="button" data-tab="subscribe"></button>
    <button id="tab-provide" class="tab" type="button" data-tab="provide"></button>
  </nav>

  <div id="bulk-actions" class="bulk-actions" hidden>
    <button id="bulk-select-all" type="button" class="ghost"></button>
    <button id="bulk-deselect-all" type="button" class="ghost"></button>
  </div>

  <main id="list" class="list" aria-busy="true">
    <div class="empty" id="loading">Loading…</div>
  </main>

  <section id="usage" class="details hidden" aria-hidden="true">
    <button class="back" id="usage-back" type="button">← Back</button>
    <h2 id="usage-title">Usage</h2>
    <div id="usage-body"></div>
  </section>

  <section id="settings" class="details hidden" aria-hidden="true">
    <button class="back" id="settings-back" type="button">← Back</button>
    <h2 id="settings-title">Settings</h2>

    <div class="usage-section">
      <h3 id="autodel-heading">Auto-delete</h3>
      <p id="autodel-hint" class="tips"></p>
      <label class="filter">
        <span id="autodel-label">Hours (1–720, blank to disable)</span>
        <input id="autodel-input" type="number" min="1" max="720" step="1" inputmode="numeric" />
      </label>
      <div class="filter-actions">
        <button id="autodel-save" type="button" class="primary">Save</button>
        <button id="autodel-clear" type="button" class="ghost">Disable</button>
      </div>
    </div>

    <div class="usage-section">
      <h3 id="dedup-debug-heading">Dedup debug</h3>
      <p id="dedup-debug-hint" class="tips"></p>
      <label class="filter">
        <input id="dedup-debug-input" type="checkbox" />
        <span id="dedup-debug-label">Enable</span>
      </label>
    </div>

    <div id="summary-prompt-section" class="usage-section" hidden>
      <h3 id="summary-prompt-heading">System prompt</h3>
      <p id="summary-prompt-hint" class="tips"></p>
      <label class="filter">
        <span id="summary-prompt-label">System prompt</span>
        <textarea id="summary-prompt-input" rows="6"></textarea>
      </label>
      <div class="filter-actions">
        <button id="summary-prompt-save" type="button" class="primary">Save</button>
        <button id="summary-prompt-reset" type="button" class="ghost">Reset</button>
      </div>
    </div>

    <div id="providers-section" class="usage-section" hidden>
      <h3 id="providers-heading">Providers</h3>
      <p id="providers-hint" class="tips"></p>
      <div id="providers-list"></div>
    </div>
  </section>

  <section id="provider-login" class="details hidden" aria-hidden="true">
    <button class="back" id="provider-login-back" type="button">← Back</button>
    <h2 id="provider-login-title"></h2>
    <p id="provider-login-step" class="tips"></p>

    <div id="provider-login-phone" class="filter" hidden>
      <span id="provider-login-phone-label">Phone</span>
      <input id="provider-login-phone-input" type="tel" autocomplete="off" inputmode="tel" />
      <div class="filter-actions">
        <button id="provider-login-phone-submit" type="button" class="primary">Send code</button>
      </div>
    </div>

    <div id="provider-login-code" class="filter" hidden>
      <span id="provider-login-code-label">Code from Telegram</span>
      <input id="provider-login-code-input" type="text" autocomplete="one-time-code" inputmode="numeric" />
      <div class="filter-actions">
        <button id="provider-login-code-submit" type="button" class="primary">Submit</button>
      </div>
    </div>

    <div id="provider-login-password" class="filter" hidden>
      <span id="provider-login-password-label">2FA password</span>
      <input id="provider-login-password-input" type="password" autocomplete="off" />
      <div class="filter-actions">
        <button id="provider-login-password-submit" type="button" class="primary">Submit</button>
      </div>
    </div>

    <div id="provider-login-done" hidden>
      <p id="provider-login-done-msg" class="tips"></p>
      <div class="filter-actions">
        <button id="provider-login-done-back" type="button" class="primary">Back to providers</button>
      </div>
    </div>

    <p id="provider-login-status" class="login-status" hidden></p>

    <div class="filter-actions" id="provider-login-cancel-row">
      <button id="provider-login-cancel" type="button" class="ghost">Cancel</button>
    </div>
  </section>

  <section id="details" class="details hidden" aria-hidden="true">
    <button class="back" id="details-back" type="button">← Back</button>
    <h2 id="details-title"></h2>
    <a id="details-link" class="link" target="_blank" rel="noopener" hidden></a>
    <p id="details-about" class="about"></p>

    <fieldset class="modes">
      <legend>Delivery mode</legend>
      <label><input type="radio" name="mode" value="off" /><span>⬜ Off</span></label>
      <label><input type="radio" name="mode" value="filtered" /><span>🔀 Filtered</span></label>
      <label><input type="radio" name="mode" value="debug" /><span>🐞 Debug</span></label>
      <label><input type="radio" name="mode" value="all" /><span>✅ All</span></label>
    </fieldset>

    <div id="provider-blacklist-section" class="provider-blacklist-section" hidden>
      <label class="filter">
        <input id="provider-blacklist-input" type="checkbox" />
        <span id="provider-blacklist-label">⛔ Blacklist for my contribution</span>
      </label>
      <p id="provider-blacklist-hint" class="tips"></p>
    </div>

    <label class="filter">
      <span>Filter prompt</span>
      <textarea id="filter-input" rows="6" placeholder="Plain-language rules for what you want to see…"></textarea>
    </label>
    <div class="filter-actions">
      <button id="filter-save" type="button" class="primary">Save filter</button>
      <button id="filter-clear" type="button" class="ghost">Clear</button>
    </div>
    <p class="tips" id="filter-tips"></p>
  </section>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/static/app.js"></script>
</body>
</html>
